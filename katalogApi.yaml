openapi: '3.0.3'
info:
  title: KatalogAPI
  version: '1.0'
servers:
  - url: https://localhost:50001/
tags:
  - name: Shop
security:
  - bearerAuth: []
paths:
  /test:
    get:
      security: []
      responses:
        '200':
          description: OK
  /artikel:
    get:
      operationId: getArtikel
      tags:
        - Shop
      summary: Gebe alle Artikel zurück
      description: Liefert alle Artikel zurück
      security:
        - bearerAuth: []
        - oauth2: [artikel:read]
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Artikel'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      operationId: createArtikel
      tags:
        - Shop
      summary: Erstelle einen Artikel
      description: |
        Ein *Artikel* wird erstellt. Erfordert die Rolle `admin`
        bzw. den Scope `artikel:write`.
      security:
        - bearerAuth: []
        - oauth2: [artikel:write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Artikel'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Artikel'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT-Bearer-Token. Die im Token enthaltenen Scopes/Rollen steuern
        den Zugriff:
          * `artikel:read`  — Leserechte auf Artikel (Rollen: `user`, `admin`)
          * `artikel:write` — Schreibrechte auf Artikel (Rolle: `admin`)
    oauth2:
      type: oauth2
      description: OAuth2 Authorization Code Flow mit Scopes als Rechte.
      flows:
        authorizationCode:
          authorizationUrl: https://auth.example.com/oauth2/authorize
          tokenUrl: https://auth.example.com/oauth2/token
          refreshUrl: https://auth.example.com/oauth2/refresh
          scopes:
            artikel:read: Artikel lesen
            artikel:write: Artikel anlegen, ändern, löschen

  responses:
    Unauthorized:
      description: Kein oder ungültiges Access-Token
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Forbidden:
      description: Token gültig, aber fehlende Rolle/Scope
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

  schemas:
    Artikel:
      type: object
      properties:
        id:
          type: string
          maxLength: 36
          format: uuid
        name:
          type: string
          maxLength: 40
          example: Kirsche
          description: Name des Artikels
        preis:
          type: number
          minimum: 0
          example: 3.99
          description: Preis des Artikels
      required:
        - name
        - preis
    Problem:
      type: object
      description: Fehlerobjekt nach RFC 7807
      properties:
        type:
          type: string
          format: uri
          example: https://example.com/errors/forbidden
        title:
          type: string
          example: Forbidden
        status:
          type: integer
          example: 403
        detail:
          type: string
          example: Fehlender Scope 'artikel:write'.
